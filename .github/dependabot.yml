# Dependabot config — see ROADMAP.md R5.9a (security and supply chain).
#
# Goals:
#   - Watch core dependencies (toolchain, Media3, ONNX Runtime, MediaPipe, Hilt,
#     Compose, Coil, OkHttp, Lottie, Room) for new releases + advisories.
#   - Watch the GitHub Actions used by .github/workflows/build.yml.
#   - Open PRs into master so each upgrade goes through normal code review.
#   - Group Gradle bumps by risk lane so a toolchain failure does not hide a
#     safe UI or runtime patch.
#   - Keep release tagging out of Dependabot: CHANGELOG.md heading/tag matching
#     is verified by scripts/verify_release_artifacts.py during release builds.
#
# Future R5.9 work tracked separately:
#   - R5.9b model checksum enforcement at runtime (lives in ModelDownloadManager).
#   - R5.9c cloud effect call-out sheet (lives in GenerativeVideoPolicy + UI).
#   - R5.9d cosign signatures on GitHub release artifacts.

version: 2
updates:
  # Gradle / Maven dependencies (gradle/libs.versions.toml + AGP plugin)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      gradle-toolchain:
        patterns:
          - "com.android.application"
          - "com.android.test"
          - "com.google.devtools.ksp"
          - "org.jetbrains.kotlin.android"
          - "org.jetbrains.kotlin.plugin.compose"
          - "org.jetbrains.kotlin:*"
          - "org.jetbrains.kotlinx:*"
      androidx-ui-compose:
        patterns:
          - "androidx.compose:*"
          - "androidx.compose.*:*"
      androidx-runtime:
        patterns:
          - "androidx.activity:*"
          - "androidx.core:*"
          - "androidx.datastore:*"
          - "androidx.hilt:*"
          - "androidx.lifecycle:*"
          - "androidx.navigation:*"
          - "androidx.room:*"
          - "androidx.window:*"
          - "androidx.work:*"
      media3-runtime:
        patterns:
          - "androidx.media3:*"
      hilt:
        patterns:
          - "com.google.dagger:hilt-*"
      ml-native:
        patterns:
          - "com.google.mediapipe:*"
          - "com.microsoft.onnxruntime:*"
          - "com.moizhassan.ffmpeg:*"
          - "io.github.kaleyravideo:*"
      network-and-media-adornments:
        patterns:
          - "com.airbnb.android:*"
          - "com.squareup.okhttp3:*"
          - "io.coil-kt:*"
      test-support:
        patterns:
          - "androidx.benchmark:*"
          - "androidx.profileinstaller:*"
          - "androidx.test:*"
          - "androidx.test.ext:*"
          - "junit:junit"

  # GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
