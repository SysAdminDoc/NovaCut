name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: 16 KB page-size alignment check (Play Store gate)
        # Google Play blocks uploads of apps targeting Android 15+ (API 35+) that
        # bundle native libraries whose ELF LOAD segments are not 16 KB aligned.
        # NovaCut targets API 36; non-compliance is a hard upload gate.
        # See docs/models.md §2 and ROADMAP.md R6.1.
        run: |
          set -e
          NATIVE_DIR="app/build/intermediates/merged_native_libs/release/out/lib"
          if [ -d "$NATIVE_DIR" ]; then
            python3 scripts/check_16kb_alignment.py "$NATIVE_DIR"
          else
            echo "No merged native libs found at $NATIVE_DIR — release build had no bundled .so. Skipping 16 KB check."
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaCut-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaCut-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "NovaCut ${{ github.ref_name }}" \
            --generate-notes \
            app/build/outputs/apk/debug/*.apk \
            app/build/outputs/apk/release/*.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
