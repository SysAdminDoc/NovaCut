name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

# Skip duplicate runs when a PR is open from the same repo: the push event for
# the branch and the pull_request event would otherwise both fire. Keep the
# pull_request run because it includes the merge-commit preview.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: read-only. Only the release job elevates to write.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Run Android Lint
        continue-on-error: true
        run: ./gradlew :app:lintDebug

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.sarif

      - name: Upload Compose metrics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compose-metrics
          path: app/build/compose_metrics/

      - name: Submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4
        with:
          dependency-graph: generate-and-submit

      - name: Build Instrumentation APK
        run: ./gradlew assembleDebugAndroidTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify release metadata
        run: python3 scripts/verify_release_artifacts.py

      - name: Verify APK size budget
        run: |
          python3 scripts/check_apk_size.py --self-test
          python3 scripts/check_apk_size.py

      - name: Verify Play listing assets
        run: python3 scripts/validate_play_listing_assets.py

      - name: Verify public release claims
        run: |
          python3 scripts/validate_public_claims.py --self-test
          python3 scripts/validate_public_claims.py --explain

      - name: Verify distribution readiness
        run: |
          python3 scripts/validate_distribution_readiness.py --self-test
          python3 scripts/validate_distribution_readiness.py

      - name: Verify Android audio API policy
        run: |
          python3 scripts/validate_android_audio_api_policy.py --self-test
          python3 scripts/validate_android_audio_api_policy.py

      - name: Locate Android build tools
        id: build-tools
        shell: bash
        run: |
          set -euo pipefail
          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          if [ -z "$build_tools_dir" ]; then
            echo "No Android build-tools directory found under $ANDROID_HOME/build-tools" >&2
            exit 1
          fi
          echo "dir=$build_tools_dir" >> "$GITHUB_OUTPUT"
          echo "Using Android build tools: $build_tools_dir"

      - name: Verify APK signatures
        shell: bash
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk; do
            "${{ steps.build-tools.outputs.dir }}/apksigner" verify --verbose --print-certs "$apk"
          done

      - name: Verify APK zip alignment
        shell: bash
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk app/build/outputs/apk/androidTest/debug/*.apk; do
            "${{ steps.build-tools.outputs.dir }}/zipalign" -c -P 16 -v 4 "$apk"
          done

      - name: 16 KB page-size alignment check (Play Store gate)
        # Google Play blocks uploads of apps targeting Android 15+ (API 35+) that
        # bundle native libraries whose ELF LOAD segments are not 16 KB aligned.
        # ClearCut targets API 36; non-compliance is a hard upload gate.
        # See docs/models.md §2 and ROADMAP.md R6.1.
        shell: bash
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk; do
            python3 scripts/check_16kb_alignment.py "$apk"
          done

      - name: Write APK SHA-256 checksums
        run: |
          python3 scripts/write_release_checksums.py --self-test
          python3 scripts/write_release_checksums.py
          python3 scripts/write_release_checksums.py --check

      - name: Write APK signing certificate fingerprints
        run: |
          python3 scripts/write_apk_signing_fingerprints.py --self-test
          python3 scripts/write_apk_signing_fingerprints.py --apksigner "${{ steps.build-tools.outputs.dir }}/apksigner"
          python3 scripts/write_apk_signing_fingerprints.py --apksigner "${{ steps.build-tools.outputs.dir }}/apksigner" --check

      - name: Generate APK provenance attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.sha256
            app/build/outputs/apk/debug/*.signing-cert-sha256
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
            app/build/outputs/apk/release/*.signing-cert-sha256
            app/build/outputs/apk/androidTest/debug/*.apk
            app/build/outputs/apk/androidTest/debug/*.sha256
            app/build/outputs/apk/androidTest/debug/*.signing-cert-sha256

      - name: Upload Debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClearCut-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.sha256
            app/build/outputs/apk/debug/*.signing-cert-sha256

      - name: Upload Release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClearCut-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
            app/build/outputs/apk/release/*.signing-cert-sha256

      - name: Upload Instrumentation APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClearCut-androidTest
          path: |
            app/build/outputs/apk/androidTest/debug/*.apk
            app/build/outputs/apk/androidTest/debug/*.sha256
            app/build/outputs/apk/androidTest/debug/*.signing-cert-sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: scripts

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ClearCut-release
          path: release-artifacts

      - name: Locate Android build tools
        id: build-tools
        shell: bash
        run: |
          set -euo pipefail
          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          if [ -z "$build_tools_dir" ]; then
            echo "No Android build-tools directory found under $ANDROID_HOME/build-tools" >&2
            exit 1
          fi
          echo "dir=$build_tools_dir" >> "$GITHUB_OUTPUT"

      - name: Verify release checksums and signing fingerprints
        run: |
          python3 scripts/write_release_checksums.py --root release-artifacts --check
          python3 scripts/write_apk_signing_fingerprints.py --root release-artifacts --apksigner "${{ steps.build-tools.outputs.dir }}/apksigner" --check

      - name: Verify APK artifact attestations
        shell: bash
        run: |
          set -euo pipefail
          for asset in release-artifacts/*.apk release-artifacts/*.sha256 release-artifacts/*.signing-cert-sha256; do
            gh attestation verify "$asset" \
              --repo "${{ github.repository }}" \
              --source-ref "${{ github.ref }}" \
              --signer-workflow "${{ github.repository }}/.github/workflows/build.yml"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ClearCut ${{ github.ref_name }}" \
            --generate-notes \
            release-artifacts/*.apk \
            release-artifacts/*.sha256 \
            release-artifacts/*.signing-cert-sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  instrumentation-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Compose smoke suite on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.novacut.editor.ClearCutSmokeTest
